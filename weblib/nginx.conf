pid ../temp/nginx/nginx.pid;

events {}

http {
  include ../temp/nginx/mime.types;
  default_type application/octet-stream;
  types {
    application/json map;
    text/javascript mjs;
  }

  access_log ../temp/nginx/access.log;

  # Avoid Windows complaining
  client_body_temp_path ../temp/nginx/client_body_temp/;
  proxy_temp_path ../temp/nginx/proxy_temp/;
  fastcgi_temp_path ../temp/nginx/fastcgi_temp/;
  uwsgi_temp_path ../temp/nginx/uwsgi_temp/;
  scgi_temp_path ../temp/nginx/scgi_temp/;

  sendfile on;
  tcp_nopush on;

  gzip on;
  gzip_types *;
  gzip_static on;

  types_hash_max_size 4096;
  server_names_hash_bucket_size 128;

  charset utf-8;
  index index.html index.htm;

  server {
    # Created by start_nginx.sh
    include ../temp/nginx/variables.conf;

    listen 2280;
    server_name localhost;

    try_files $uri $uri/ $uri.html =404;
    autoindex on;

    # Required for SharedArrayBuffer
    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Opener-Policy same-origin;

    # For development: can store, but always check for newer version
    add_header Cache-Control no-cache;

    root ../;

    location /.conan2/ {
      alias $home/.conan2/;
    }
    location /emsdk/ {
      alias $emsdk/;
    }
    location /emsdk/emscripten/ {
      alias $emsdk/upstream/emscripten/;
    }
    # Firefox has trouble finding the right location
    location /weblib/cache/ {
      alias $build_folder/cpp/cache/;
    }
  }
}
